<div class="background">
	<div class="hero">
		<h1> Intresseanmälan </h1>
		<br>
		<p> Fyll i formuläret för att få information om kommande kurser och workshops. </p>
		<br>
		<form> <!-- Används för att skilja formar och ge en disposition i koden-->
			<input type="name" style="height: 40px; width: 60vh; text-align: center; margin-bottom: 20px; font-size: 20px;" name="name" placeholder="För & efternamn & hit enter" required> <!-- Frågar om vilken typ av sak ska skrivas, vad den ska heta och placeholder talar till användaren vad den ska skriva, den stylas i html för att css går ej-->
			<br>
			<input type="email" style="height: 40px; width: 60vh; text-align: center; margin-bottom: 20px; font-size: 20px;" name="email" placeholder="Skriv email & hit enter" required> <!-- Frågar om vilken typ av sak ska skrivas, vad den ska heta och placeholder talar till användaren vad den ska skriva, den stylas i html för att css går ej-->
			<br>
			<input type="message" style="height: 40px; width: 60vh; text-align: center; margin-bottom: 20px; font-size: 20px;" name="message" placeholder="Skriv meddelande & hit enter" required> <!-- Frågar om vilken typ av sak ska skrivas, vad den ska heta och placeholder talar till användaren vad den ska skriva, den stylas i html för att css går ej-->
		</form>
		<button class="send">Skicka</button>
